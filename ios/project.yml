name: kfit
options:
  bundleIdPrefix: com.kfit
  deploymentTarget:
    iOS: "15.0"
    watchOS: "8.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  kfit:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: kfit
        excludes:
          - "**/*.plist"
    info:
      path: kfit/Info.plist
      properties:
        CFBundleDisplayName: kfit
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSMotionUsageDescription: "kfit uses motion sensors to accurately count your exercise reps and measure form quality."
        NSCameraUsageDescription: "kfit may use camera for form analysis in the future."
        NSLocalNetworkUsageDescription: "kfit needs local network access for Firebase authentication."
        NSBonjourServices:
          - _firebase._tcp
        UIRequiredDeviceCapabilities:
          - accelerometer
          - gyroscope
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kfitappduo.app
        INFOPLIST_FILE: kfit/Info.plist
    dependencies:
      - target: kfitWatch

  kfitWatch:
    type: application
    platform: watchOS
    deploymentTarget: "8.0"
    sources:
      - path: kfitWatch
        excludes:
          - "**/*.plist"
    info:
      path: kfitWatch/Info.plist
      properties:
        CFBundleDisplayName: kfit
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.kfitappduo.app
        NSMotionUsageDescription: "kfit uses motion sensors to count exercise reps accurately."
        UIRequiredDeviceCapabilities:
          - accelerometer
          - gyroscope
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kfitappduo.app.watchkitapp
        INFOPLIST_FILE: kfitWatch/Info.plist
