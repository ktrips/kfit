name: kfit
options:
  bundleIdPrefix: com.kfit
  deploymentTarget:
    iOS: "15.0"
    watchOS: "8.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "4AY62KCVSN"

targets:
  kfit:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: kfit
        excludes:
          - "**/*.plist"
      - path: kfit/GoogleService-Info.plist
        buildPhase: resources
      - path: kfit/Assets.xcassets
    info:
      path: kfit/Info.plist
      properties:
        CFBundleDisplayName: kfit
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSMotionUsageDescription: "kfit uses motion sensors to accurately count your exercise reps and measure form quality."
        NSCameraUsageDescription: "kfit may use camera for form analysis in the future."
        NSLocalNetworkUsageDescription: "kfit needs local network access for Firebase authentication."
        NSHealthShareUsageDescription: "kfit reads heart rate, activity, and sleep data from Apple Health to show your fitness summary."
        NSHealthUpdateUsageDescription: "kfit may write workout data to Apple Health."
        NSBonjourServices:
          - _firebase._tcp
        UIRequiredDeviceCapabilities:
          - accelerometer
          - gyroscope
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - com.googleusercontent.apps.447854410903-9p4cdpet97v8qecmv4lk61egqudq4t21
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kfitappduo.app
        INFOPLIST_FILE: kfit/Info.plist
    entitlements:
      path: kfit/kfit.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
    dependencies:
      - target: kfitWatch

  kfitWatch:
    type: application
    platform: watchOS
    deploymentTarget: "8.0"
    sources:
      - path: kfitWatch
        excludes:
          - "**/*.plist"
      - path: kfitWatch/Assets.xcassets
    info:
      path: kfitWatch/Info.plist
      properties:
        CFBundleDisplayName: kfit
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.kfitappduo.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kfitappduo.app.watchkitapp
        INFOPLIST_FILE: kfitWatch/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "4AY62KCVSN"
